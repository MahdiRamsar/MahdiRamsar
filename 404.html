<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0;url=/">
    <title>انتقال به صفحه اصلی - سایه‌های بی‌نقاب</title>
    <script>
        // هدایت فوری به صفحه اصلی
        window.location.href = '/';
    </script>
    <style>
        body {
            font-family: 'Vazirmatn', 'Segoe UI', sans-serif;
            background: #07080b;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            direction: rtl;
        }
        .loader {
            padding: 40px;
        }
        .loader i {
            font-size: 3rem;
            color: oklch(0.6 0.2 270);
            animation: pulse 1.5s ease-in-out infinite;
        }
        .loader p {
            margin-top: 20px;
            opacity: 0.7;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <i class="fas fa-spinner fa-pulse"></i>
        <p>در حال انتقال به صفحه اصلی...</p>
        <p style="font-size:0.8rem; opacity:0.4;">سایت سایه‌های بی‌نقاب</p>
    </div>
</body>
</html>
